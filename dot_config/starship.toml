# Starship prompt — managed by chezmoi
# Docs: https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$python\
$rust\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[golang]
format = "[$symbol($version)]($style) "
symbol = " "

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "

[python]
format = "[$symbol($version)]($style) "
symbol = " "

[rust]
format = "[$symbol($version)]($style) "
symbol = " "

[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "⎈ "

[docker_context]
disabled = true

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
